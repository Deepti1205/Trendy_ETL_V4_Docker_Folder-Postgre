services:

  postgres:
    image: postgres:15
    container_name: postgres-etl
    environment:
      POSTGRES_USER: etl_user
      POSTGRES_PASSWORD: etl_pass
      POSTGRES_DB: etl_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  etl:
    build: .
    container_name: etl-pipeline
    depends_on:
      - postgres
    volumes:
      - .:/app
    command: >
      sh -c "
      echo 'Waiting for Postgres...';
      sleep 10;
      python run_pipeline.py
      "

volumes:
  postgres_data:
